{% extends "base.html" %}
{% block title %}学习数据{% endblock %}
{% block content %}
<div style="max-width:900px;margin:0 auto;padding:24px 20px">
  <h1 style="font-size:28px;font-weight:800;margin:0 0 24px">📊 我的学习数据</h1>

  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:32px">
    <div style="background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;border-radius:14px;padding:24px;text-align:center">
      <div style="font-size:36px;font-weight:900" id="statStreak">-</div>
      <div style="font-size:13px;opacity:0.8;margin-top:4px">🔥 连续学习天数</div>
    </div>
    <div style="background:linear-gradient(135deg,#ff5722,#ff9800);color:white;border-radius:14px;padding:24px;text-align:center">
      <div style="font-size:36px;font-weight:900" id="statTotal">-</div>
      <div style="font-size:13px;opacity:0.9;margin-top:4px">📚 总使用次数</div>
    </div>
    <div style="background:linear-gradient(135deg,#e53935,#ef5350);color:white;border-radius:14px;padding:24px;text-align:center">
      <div style="font-size:36px;font-weight:900" id="statWrong">-</div>
      <div style="font-size:13px;opacity:0.9;margin-top:4px">📕 待复习错题</div>
    </div>
    <div style="background:linear-gradient(135deg,#2e7d32,#43a047);color:white;border-radius:14px;padding:24px;text-align:center">
      <div style="font-size:36px;font-weight:900" id="statMastered">-</div>
      <div style="font-size:13px;opacity:0.9;margin-top:4px">✅ 已掌握错题</div>
    </div>
  </div>

  <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:24px">
    <h3 style="margin:0 0 20px;font-size:16px">📈 最近7天学习趋势</h3>
    <div id="chartArea" style="display:flex;align-items:flex-end;gap:8px;height:160px;padding:0 8px">
      <div style="color:var(--text-secondary);font-size:13px">加载中...</div>
    </div>
    <div id="chartLabels" style="display:flex;gap:8px;padding:0 8px;margin-top:6px"></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <a href="/wrong_book" style="text-decoration:none;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;text-align:center;transition:transform .2s" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform=''">
      <div style="font-size:32px;margin-bottom:8px">📕</div>
      <div style="font-weight:700;color:var(--text)">查看错题本</div>
      <div style="font-size:12px;color:var(--text-secondary);margin-top:4px">复习错题，巩固薄弱点</div>
    </a>
    <a href="/tutor" style="text-decoration:none;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;text-align:center;transition:transform .2s" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform=''">
      <div style="font-size:32px;margin-bottom:8px">🤖</div>
      <div style="font-weight:700;color:var(--text)">AI 智能导师</div>
      <div style="font-size:12px;color:var(--text-secondary);margin-top:4px">继续学习，生成更多题目</div>
    </a>
  </div>
</div>

<script>
async function loadStats() {
    const res = await fetch('/api/study_stats');
    const data = await res.json();

    document.getElementById('statStreak').textContent = data.streak;
    document.getElementById('statTotal').textContent = data.total_usage;
    document.getElementById('statWrong').textContent = data.total_wrong;
    document.getElementById('statMastered').textContent = data.mastered_wrong;

    // 画柱状图
    const chart = document.getElementById('chartArea');
    const labels = document.getElementById('chartLabels');
    const days = [];
    const now = new Date();
    for (let i = 6; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(d.getDate() - i);
        days.push(d.toISOString().split('T')[0]);
    }

    let maxVal = 1;
    const dayTotals = days.map(function(d) {
        const dd = data.daily_data[d] || {};
        const total = (dd.mindmap || 0) + (dd.quiz || 0) + (dd.chat || 0) + (dd.example || 0);
        if (total > maxVal) maxVal = total;
        return {date: d, total: total, data: dd};
    });

    chart.innerHTML = dayTotals.map(function(item) {
        const h = Math.max(4, (item.total / maxVal) * 140);
        const color = item.total > 0 ? 'linear-gradient(to top, var(--primary), #c9a55c)' : '#e5e7eb';
        return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">'
            + '<span style="font-size:12px;font-weight:700;color:var(--text)">' + (item.total || '') + '</span>'
            + '<div style="width:100%;height:' + h + 'px;background:' + color + ';border-radius:6px 6px 0 0;transition:height .5s"></div>'
            + '</div>';
    }).join('');

    labels.innerHTML = dayTotals.map(function(item) {
        const weekdays = ['日','一','二','三','四','五','六'];
        const d = new Date(item.date);
        return '<div style="flex:1;text-align:center;font-size:11px;color:var(--text-secondary)">周' + weekdays[d.getDay()] + '</div>';
    }).join('');
}
loadStats();
</script>
{% endblock %}
