<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>登录 - AI智能导师</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#1a1a2e;--accent:#c9a55c;--bg:#f5f4f0;--card:#fff;--border:#e5e2d9;--text:#1a1a1a;--sans:'Noto Sans SC',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 4px 20px rgba(0,0,0,0.05)}
h1{font-size:24px;text-align:center;margin-bottom:8px}
.sub{text-align:center;color:#666;font-size:14px;margin-bottom:28px}
label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:6px}
input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;outline:none;margin-bottom:16px;box-sizing:border-box;font-family:var(--sans)}
input:focus{border-color:var(--accent)}
button{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s}
button:hover{opacity:0.9}
.link{text-align:center;margin-top:16px;font-size:13px;color:#666}
.link a{color:var(--accent);text-decoration:none;font-weight:600}
.flash{background:#fff3e0;color:#e65100;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;text-align:center}
</style>
</head>
<body>
<div class="card">
    <h1>🤖 AI 智能导师</h1>
    <p class="sub">登录你的账号</p>
    {% with messages = get_flashed_messages() %}{% if messages %}{% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}{% endif %}{% endwith %}
    <form method="POST">
        <label>手机号</label>
        <input type="tel" name="phone" placeholder="请输入手机号" maxlength="11" required>
        <label>密码</label>
        <input type="password" name="password" placeholder="请输入密码" required>
        <button type="submit">登录</button>
    </form>
    <div class="link">没有账号？<a href="/ai/register">去注册</a></div>
    <div class="link"><a href="/ai">先不登录，直接体验</a></div>
</div>
</body>
</html>
