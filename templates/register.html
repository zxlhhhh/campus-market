{% extends "base.html" %}
{% block title %}注册 - 校园集市{% endblock %}
{% block extra_css %}
<style>
.auth-page { display:flex; justify-content:center; padding:48px 20px; }
.auth-card { background:var(--card); padding:36px; border-radius:16px; width:100%; max-width:420px; box-shadow:var(--shadow-lg); }
.auth-card h2 { font-size:24px; font-weight:900; margin-bottom:28px; text-align:center; letter-spacing:-0.5px; }
.auth-card .btn { width:100%; padding:14px; font-size:16px; margin-top:10px; justify-content:center; }
.auth-footer { text-align:center; margin-top:20px; font-size:14px; color:var(--text-secondary); }
.auth-footer a { color:var(--primary); text-decoration:none; font-weight:600; }
</style>
{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>注册账号</h2>
        <form method="post">
            <div class="form-group"><label>用户名</label><input name="username" required placeholder="给自己起个名字"></div>
            <div class="form-group"><label>手机号</label><input name="phone" required placeholder="输入手机号"></div>
            <div class="form-group"><label>密码</label><input name="password" type="password" required placeholder="设置密码（至少6位）" minlength="6"></div>
            <div class="form-group"><label>学校（选填）</label><input name="campus" placeholder="你的学校名称"></div>
            <button class="btn btn-primary" type="submit">注册</button>
        </form>
        <div class="auth-footer">已有账号？<a href="{{ url_for('login') }}">去登录</a></div>
    </div>
</div>
{% endblock %}
