{% extends "base.html" %}
{% block title %}登录 - 校园集市{% endblock %}
{% block content %}
<div style="max-width:420px;margin:60px auto;padding:30px;background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.1)">
    <h2 style="text-align:center;margin-bottom:25px;color:#333">🔑 登录校园集市</h2>
    {% with messages = get_flashed_messages() %}{% if messages %}
    {% for msg in messages %}<div style="background:#fff3f3;color:#e74c3c;padding:10px;border-radius:6px;margin-bottom:15px;text-align:center">{{ msg }}</div>{% endfor %}
    {% endif %}{% endwith %}
    <form method="post" style="display:flex;flex-direction:column;gap:15px">
        <div>
            <label style="display:block;margin-bottom:5px;font-weight:600;color:#555">学号</label>
            <input type="text" name="student_id" required placeholder="输入11位学号" maxlength="11" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:15px;box-sizing:border-box">
        </div>
        <div>
            <label style="display:block;margin-bottom:5px;font-weight:600;color:#555">密码</label>
            <input type="password" name="password" required placeholder="输入密码" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:15px;box-sizing:border-box">
        </div>
        <button type="submit" style="padding:12px;background:#e74c3c;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:5px">登 录</button>
    </form>
    <p style="text-align:center;margin-top:20px;color:#999">还没有账号？<a href="{{ url_for('register') }}" style="color:#e74c3c;text-decoration:none">去注册</a></p>
</div>
{% endblock %}
