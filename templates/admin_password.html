{% extends "admin_base.html" %}
{% block admin_content %}
<h2>🔑 修改管理员密码</h2>
    {% with messages = get_flashed_messages() %}{% if messages %}
    {% for msg in messages %}<div style="background:#fef3c7;color:#92400e;padding:10px;border-radius:8px;margin-bottom:14px;font-size:13px">{{ msg }}</div>{% endfor %}
    {% endif %}{% endwith %}
    <form method="post" style="display:flex;flex-direction:column;gap:14px">
      <div>
        <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px">当前密码</label>
        <input type="password" name="old_password" required style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none">
      </div>
      <div>
        <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px">新密码（至少6位）</label>
        <input type="password" name="new_password" required minlength="6" style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none">
      </div>
      <button type="submit" style="padding:12px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;margin-top:6px">修改密码</button>
    </form>
{% endblock %}
